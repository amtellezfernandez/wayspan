<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="900" viewBox="0 0 1100 900" role="img" aria-labelledby="title desc">
  <title id="title">WOD2Sim AlpaSim rollout diagnostic view</title>
  <desc id="desc">Synthetic diagnostic view showing an AlpaSim route map, policy command, audit panel, and camera stream tile without redistributing scene media.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbfa"/>
      <stop offset="100%" stop-color="#e6f0ec"/>
    </linearGradient>
    <linearGradient id="camera" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12343b"/>
      <stop offset="100%" stop-color="#0b171b"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d7e3df" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1100" height="900" rx="28" fill="url(#bg)"/>
  <rect x="42" y="42" width="1016" height="816" rx="22" fill="#ffffff" filter="url(#softShadow)"/>

  <g transform="translate(78 72)">
    <text x="0" y="0" fill="#20363b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">AlpaSim rollout diagnostic</text>
    <text x="0" y="34" fill="#607579" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">Synthetic public view: route geometry, command stream, and audit state without scene media.</text>
  </g>

  <g transform="translate(78 140)">
    <rect width="590" height="430" rx="18" fill="#f3f8f6" stroke="#d5e4df"/>
    <rect width="590" height="430" rx="18" fill="url(#grid)" opacity="0.82"/>

    <path d="M110 -20 C150 96, 154 184, 170 300 C178 356, 196 406, 218 458" fill="none" stroke="#111827" stroke-width="6" opacity="0.78"/>
    <path d="M240 -20 C280 96, 284 184, 300 300 C308 356, 326 406, 348 458" fill="none" stroke="#111827" stroke-width="6" opacity="0.78"/>
    <path d="M370 -20 C410 96, 414 184, 430 300 C438 356, 456 406, 478 458" fill="none" stroke="#111827" stroke-width="6" opacity="0.78"/>

    <path d="M176 -20 C216 96, 220 184, 236 300 C244 356, 262 406, 284 458" fill="none" stroke="#8fb2bf" stroke-width="2" stroke-dasharray="16 12"/>
    <path d="M304 -20 C344 96, 348 184, 364 300 C372 356, 390 406, 412 458" fill="none" stroke="#8fb2bf" stroke-width="2" stroke-dasharray="16 12"/>

    <path d="M52 378 C150 348, 223 322, 288 262 C338 216, 404 190, 554 166" fill="none" stroke="#6487c6" stroke-width="3" opacity="0.62"/>
    <path d="M58 410 C166 372, 238 334, 304 276 C360 226, 424 204, 560 188" fill="none" stroke="#6487c6" stroke-width="3" opacity="0.62"/>
    <path d="M66 436 C182 398, 250 348, 318 292 C376 244, 448 224, 566 212" fill="none" stroke="#6487c6" stroke-width="3" opacity="0.62"/>

    <path d="M92 420 C168 366, 248 326, 326 290" fill="none" stroke="#d97928" stroke-width="8" stroke-linecap="round"/>
    <path d="M326 290 C372 268, 426 246, 544 228" fill="none" stroke="#36a38f" stroke-width="5" stroke-linecap="round"/>

    <g transform="translate(306 276) rotate(-19)">
      <rect x="-24" y="-44" width="48" height="88" rx="17" fill="#6ad6a7" stroke="#177b63" stroke-width="3"/>
      <rect x="-14" y="-28" width="28" height="44" rx="10" fill="#bff3df" opacity="0.84"/>
      <path d="M0 -54 L0 -88" stroke="#177b63" stroke-width="5" stroke-linecap="round"/>
    </g>

    <g fill="#eef2f4" stroke="#334155" stroke-width="3">
      <rect x="318" y="70" width="36" height="84" rx="14" transform="rotate(-11 336 112)"/>
      <rect x="444" y="114" width="42" height="92" rx="16" transform="rotate(13 465 160)"/>
      <rect x="194" y="188" width="38" height="82" rx="14" transform="rotate(11 213 229)"/>
      <rect x="86" y="270" width="40" height="88" rx="15" transform="rotate(17 106 314)"/>
    </g>

    <rect x="22" y="22" width="168" height="38" rx="9" fill="#17232a"/>
    <text x="40" y="48" fill="#ffffff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">Command: RIGHT</text>
  </g>

  <g transform="translate(696 140)">
    <rect width="326" height="430" rx="18" fill="#ffffff" stroke="#d5e4df"/>
    <text x="28" y="44" fill="#20363b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="23" font-weight="700">Audit snapshot</text>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">
      <text x="28" y="92" fill="#607579">adapter</text>
      <text x="186" y="92" fill="#20363b" font-weight="700">token_dagger_bc</text>
      <line x1="28" y1="114" x2="298" y2="114" stroke="#e5eeee"/>
      <text x="28" y="150" fill="#607579">trajectory horizon</text>
      <text x="214" y="150" fill="#20363b" font-weight="700">5.0 s</text>
      <line x1="28" y1="172" x2="298" y2="172" stroke="#e5eeee"/>
      <text x="28" y="208" fill="#607579">resampling</text>
      <text x="222" y="208" fill="#20363b" font-weight="700">runtime dt</text>
      <line x1="28" y1="230" x2="298" y2="230" stroke="#e5eeee"/>
      <text x="28" y="266" fill="#607579">sensor freshness</text>
      <text x="224" y="266" fill="#177b63" font-weight="700">checked</text>
      <line x1="28" y1="288" x2="298" y2="288" stroke="#e5eeee"/>
      <text x="28" y="324" fill="#607579">claim gate</text>
      <text x="220" y="324" fill="#b45309" font-weight="700">audit first</text>
    </g>
    <rect x="28" y="356" width="270" height="46" rx="12" fill="#ecfdf5" stroke="#b7ebd0"/>
    <text x="50" y="386" fill="#177b63" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">manifest + hashes</text>
  </g>

  <g transform="translate(78 604)">
    <rect width="944" height="198" rx="18" fill="url(#camera)" filter="url(#softShadow)"/>
    <path d="M0 198 L282 0 H662 L944 198 Z" fill="#1f4f54" opacity="0.42"/>
    <path d="M356 198 L454 0 H490 L516 198 Z" fill="#f6c16d" opacity="0.9"/>
    <path d="M588 198 L516 0 H558 L776 198 Z" fill="#38bdf8" opacity="0.24"/>
    <text x="36" y="52" fill="#e2f4f1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700">Camera stream diagnostic</text>
    <text x="36" y="88" fill="#a9c5c1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">Public artifacts show diagnostics, not raw gated scene frames.</text>
    <g transform="translate(736 38)">
      <rect width="164" height="122" rx="16" fill="#071115" stroke="#31545a"/>
      <circle cx="82" cy="61" r="34" fill="#1e3a42" stroke="#78f0d4" stroke-width="5"/>
      <circle cx="82" cy="61" r="13" fill="#78f0d4"/>
    </g>
  </g>
</svg>
