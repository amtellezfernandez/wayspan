name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install package
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run focused bridge tests
        run: |
          .venv/bin/pytest \
            tests/test_alpasim_integration.py \
            tests/test_alpasim_setup_scripts.py \
            tests/test_check_alpasim_readiness.py \
            tests/test_run_alpasim_scene_batch.py \
            tests/test_audit_alpasignal_bridge.py \
            tests/test_wod2sim_doctor.py

      - name: Run strict installed doctor
        run: |
          .venv/bin/wod2sim-doctor --strict-installed --json

      - name: Build package
        run: |
          .venv/bin/python -m build

      - name: Smoke test built wheel install
        run: |
          uv venv /tmp/wod2sim-wheel-smoke
          uv pip install --python /tmp/wod2sim-wheel-smoke/bin/python dist/*.whl
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-doctor --strict-installed --json
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-build-oracle-proxy --help > /dev/null
          /tmp/wod2sim-wheel-smoke/bin/python - <<'PY'
          from pathlib import Path
          from minimal_shot_av.cli.commands.run_alpasim_local_external import MODEL_PRESETS, SCENE_PRESETS
          from minimal_shot_av.cli.commands.setup_alpasim_local_plugin import ALPASIM_OVERRIDE_ROOT

          assert ALPASIM_OVERRIDE_ROOT.is_dir(), ALPASIM_OVERRIDE_ROOT
          assert all(Path(spec["config_file"]).is_file() for spec in MODEL_PRESETS.values())
          assert all(Path(path).is_file() for path in SCENE_PRESETS.values())
          print("wheel config and override payload OK")
          PY
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-audit-signal --output /tmp/wod2sim-wheel-audit.json
          /tmp/wod2sim-wheel-smoke/bin/wod2sim-batch \
            --mode print \
            --model spotlight_reflex \
            --scene-limit 1 \
            --batch-dir /tmp/wod2sim-wheel-batch
          test -f /tmp/wod2sim-wheel-audit.json
          test -f /tmp/wod2sim-wheel-batch/batch-status.json

      - name: Check tracked-file hygiene
        run: |
          if git ls-files | grep -E '(__pycache__/|\.pyc$|\.egg-info/)'; then
            echo "Tracked generated artifacts detected"
            exit 1
          fi
          test -z "$(git status --porcelain)"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wod2sim-dist
          path: dist/*

  paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build paper
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: paper

      - name: Upload paper artifact
        uses: actions/upload-artifact@v7
        with:
          name: wod2sim-paper
          path: paper/paper.pdf
